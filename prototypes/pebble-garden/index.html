<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pebble Garden Prototype</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell" aria-label="Pebble Garden mechanics prototype">
      <section class="game-surface">
        <header class="top-bar">
          <div>
            <p class="eyebrow">Mechanics Prototype</p>
            <h1>Pebble Garden</h1>
          </div>
          <div class="score-panel" aria-live="polite">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
        </header>

        <section class="status-row" aria-live="polite">
          <p id="message">Clear groups through marked beds before moves run out.</p>
          <button id="new-game" class="text-button" type="button">New Board</button>
        </section>

        <section class="goal-panel" aria-label="Garden goal">
          <div class="goal-copy">
            <span>Garden Goal</span>
            <strong id="goal-label">Bloom 4 beds</strong>
            <em id="flow-label">Flow x1</em>
            <em id="move-label">14 moves</em>
          </div>
          <div class="goal-meter" aria-hidden="true">
            <span id="goal-fill"></span>
          </div>
        </section>

        <section class="board-wrap">
          <div id="board" class="board" aria-label="Pebble Garden board"></div>
        </section>

        <section class="tray-area" aria-label="Pebble tray">
          <div class="tray-header">
            <span>Pebble Tray</span>
            <span id="garden-label">Beds 0/4</span>
          </div>
          <div id="tray" class="tray"></div>
        </section>

        <footer class="controls-note">
          <span>Select pebble</span>
          <span>Aim at beds</span>
          <span>Bloom beds</span>
        </footer>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
